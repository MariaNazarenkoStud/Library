# ============================================================
# Book Catalogue — logging configuration
# Edit this file to change log levels WITHOUT recompiling.
#
# To apply this file explicitly:
#   java -Djava.util.logging.config.file=logging.properties -jar BookCatalogue.jar
#
# Alternatively, just place this file in the working directory —
# AppLogger.configure() detects and loads it automatically.
#
# You can also override the level at launch without editing this file:
#   java -Dlevel=FINE -jar BookCatalogue.jar
#   LOG_LEVEL=FINE java -jar BookCatalogue.jar
#
# Valid levels: SEVERE | WARNING | INFO | CONFIG | FINE | FINER | FINEST | ALL | OFF
# ============================================================

# --- Handlers ---
handlers = java.util.logging.ConsoleHandler, java.util.logging.FileHandler

# --- Root logger ---
.level = INFO

# --- Console handler ---
java.util.logging.ConsoleHandler.level     = INFO
java.util.logging.ConsoleHandler.formatter = LogFormatter

# --- File handler (rotating) ---
# Pattern: logs/bookcatalogue0.log … bookcatalogue4.log
# limit  = max bytes per file before rotation (5 MB)
# count  = number of files to keep in rotation
java.util.logging.FileHandler.level     = ALL
java.util.logging.FileHandler.pattern   = logs/bookcatalogue%g.log
java.util.logging.FileHandler.limit     = 5242880
java.util.logging.FileHandler.count     = 5
java.util.logging.FileHandler.append    = true
java.util.logging.FileHandler.formatter = LogFormatter

# --- Per-logger overrides (uncomment to enable verbose logging for a module) ---
# Catalogue.level  = FINE
# BookGUI.level    = FINE
# ErrorHandler.level = FINE
